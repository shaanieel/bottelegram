app:
  name: "ZAEIN Automation Bot"
  timezone: "Asia/Riyadh"
  max_parallel_downloads: 1
  max_parallel_uploads: 1
  auto_delete_after_upload: true
  history_size: 50

paths:
  download_dir: "downloads"
  log_dir: "logs"
  temp_dir: "temp"
  data_dir: "data"
  jobs_file: "data/jobs.json"

bunny:
  library_id: "656273"
  cdn_hostname: "vz-eaddacc6-5f8.b-cdn.net"
  api_base: "https://video.bunnycdn.com"
  request_timeout_seconds: 60
  upload_timeout_seconds: 7200

download:
  default_tool: "auto"      # auto | gdown | ytdlp | direct
  allow_direct_link: true
  allow_google_drive: true
  allow_ytdlp: true
  max_file_size_gb: 20
  request_timeout_seconds: 60
  chunk_size_bytes: 1048576 # 1 MiB
  user_agent: "Mozilla/5.0 (compatible; ZAEINBot/1.0)"

  # Engine order untuk link Google Drive:
  #   1. GDriveAPI (kalau prefer_gdrive_api=true DAN API key/SA dikonfigurasi)
  #   2. gdown
  #   3. yt-dlp (fallback terakhir)
  prefer_gdrive_api: true
  gdrive_api_timeout_seconds: 30
  gdrive_api_chunk_size_bytes: 8388608  # 8 MiB

upload_targets:
  bunny_stream:
    enabled: true
  player4me:
    enabled: true
    # Kalau true dan URL terlihat publik (Drive uc?id=, dll), bot akan coba
    # advance-upload (server player4me yang fetch) sebelum jatuh ke TUS lokal.
    prefer_url_ingest: true
    # Optional Folder ID untuk auto-foldering di player4me. Kosongkan bila
    # tidak butuh.
    default_folder_id: ""
    # Default 2-char ISO 639-1 language code dipakai kalau ffprobe / nama
    # file tidak menyebutkan bahasa subtitle (mis. "en", "ja"). Default
    # "id" (Indonesia) sesuai kebutuhan utama bot.
    default_subtitle_language: "id"
  local_only:
    enabled: true

video_extensions:
  - ".mp4"
  - ".mkv"
  - ".mov"
  - ".avi"
  - ".webm"
  - ".m4v"

logging:
  level: "INFO"
  max_bytes: 5242880   # 5 MiB
  backup_count: 5
  format: "%(asctime)s [%(levelname)s] %(name)s - %(message)s"
