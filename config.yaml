app:
  name: "ZAEIN Automation Bot"
  timezone: "Asia/Riyadh"
  max_parallel_downloads: 5
  max_parallel_uploads: 5
  auto_delete_after_upload: true
  history_size: 50

paths:
  download_dir: "downloads"
  log_dir: "logs"
  temp_dir: "temp"
  data_dir: "data"
  jobs_file: "data/jobs.json"

bunny:
  library_id: "656273"
  cdn_hostname: "vz-eaddacc6-5f8.b-cdn.net"
  api_base: "https://video.bunnycdn.com"
  request_timeout_seconds: 60
  upload_timeout_seconds: 7200

download:
  default_tool: "auto"      # auto | gdown | ytdlp | direct
  allow_direct_link: true
  allow_google_drive: true
  allow_ytdlp: true
  max_file_size_gb: 20
  request_timeout_seconds: 60
  chunk_size_bytes: 4194304 # 4 MiB
  user_agent: "Mozilla/5.0 (compatible; ZAEINBot/1.0)"
  prefer_gdrive_api: true
  gdrive_api_timeout_seconds: 30
  gdrive_api_chunk_size_bytes: 8388608  # 8 MiB

upload_targets:
  bunny_stream:
    enabled: true
  player4me:
    enabled: true
    prefer_url_ingest: true
    default_folder_id: ""
    default_subtitle_language: "id"
  local_only:
    enabled: true

# ----- Google Drive Upload (untuk fitur mirror_gdrive) -----
gdrive_upload:
  # Folder ID tujuan default di Google Drive.
  # Kosongkan ("") untuk upload ke root Drive.
  # Advanced mirror panel bisa otomatis membuat folder:
  # - ZaeinBot
  # - ZaeinBot/VMX Zaein
  default_folder_id: ""

video_extensions:
  - ".mp4"
  - ".mkv"
  - ".mov"
  - ".avi"
  - ".webm"
  - ".m4v"

logging:
  level: "INFO"
  max_bytes: 5242880   # 5 MiB
  backup_count: 5
  format: "%(asctime)s [%(levelname)s] %(name)s - %(message)s"
